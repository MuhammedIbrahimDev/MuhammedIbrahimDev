name: Generate GitHub Snake

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-github-snake:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the repository
        uses: actions/checkout@v6.0.2

      - name: Create assets folder
        run: mkdir -p assets

      - name: Generate GitHub Snake
        uses: Platane/snk@v3.4.1
        with:
          github_user_name: MuhammedIbrahimDev
          outputs: |
            assets/github-snake.svg
            assets/github-snake-dark.svg?palette=github-dark
            assets/ocean.gif?color_snake=orange&color_dots=#bfd6f6,#8dbdff,#64a1f4,#4b91f1,#3c7dd9

      - name: Configure Git
        run: |
          git config user.name "MuhammedIbrahimDev"
          git config user.email "actions@github.com"

      - name: Commit and push files
        run: |
          git add assets/*
          git commit -m "Add generated GitHub Snake images" || echo "No changes to commit"
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
